name: Build voxel-world image to Aliyun ACR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "voxel-world/**"
      - ".github/workflows/voxel-world-acr.yml"

env:
  REGISTRY: registry.cn-shenzhen.aliyuncs.com
  NAMESPACE: manji1233
  IMAGE_NAME: voxel-world

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./voxel-world
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
